name: Build Web to APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # This action packages your web files into an APK
      - name: Convert to APK
        uses: darkshredder/web-to-app-action@main
        with:
          build-folder-path: "./"           # Folder where your index.html is
          app-name: "WordToTextApp"         # Name of your app
          output-folder-path: "my-apks"     # Where to store the APK

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: my-android-app
          path: my-apks/
