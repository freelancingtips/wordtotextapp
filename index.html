<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WordToText</title>
<link rel="icon" href="assets/favicon.ico" type="image/x-icon">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#3b82f6">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
<img src="assets/logo.png" alt="WordToText Logo">
<h1>WordToText</h1>
<p>Convert Word Documents to Clean Text Instantly</p>
</header>

<main class="container">
<div id="dropArea">
<h2>Upload Word File</h2>
<p>Drag & Drop .DOCX or click to select</p>
<input type="file" id="fileInput" accept=".docx">
</div>

<textarea id="output" placeholder="Your converted text will appear here..." readonly></textarea>

<div class="buttons">
<button id="copyBtn">Copy</button>
<button id="downloadBtn">Download TXT</button>
</div>
</main>

<footer>
<p>© 2026 WordToText</p>
</footer>

<script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>
<script src="app.js"></script>
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function() {
    navigator.serviceWorker.register("sw.js").then(function(reg) {
      console.log("Service Worker registered:", reg.scope);
    }).catch(function(err) {
      console.log("Service Worker registration failed:", err);
    });
  });
}
</script>

</body>
</html>
