<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WordToText</title>
<link rel="icon" href="assets/favicon.ico" type="image/x-icon">

<style>
body{
margin:0;
font-family:system-ui;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
}

header{
text-align:center;
padding:40px 20px;
}

header img{
width:70px;
height:auto;
display:block;
margin:0 auto 10px;
}

header h1{
margin:5px 0;
font-size:28px;
}

header p{
margin:0;
opacity:.7;
}

.container{
max-width:700px;
margin:auto;
padding:20px;
}

#dropArea{
background:#1e293b;
border:2px dashed #3b82f6;
padding:40px;
text-align:center;
border-radius:12px;
margin-bottom:20px;
cursor:pointer;
transition:0.3s;
}

#dropArea:hover{
background:#334155;
}

input[type=file]{
margin-top:10px;
cursor:pointer;
}

textarea{
width:100%;
height:260px;
border-radius:10px;
border:none;
padding:15px;
font-size:15px;
margin-top:10px;
resize:none;
background:#0f172a;
color:white;
}

.buttons{
margin-top:15px;
text-align:center;
}

button{
background:#3b82f6;
border:none;
padding:10px 20px;
margin:5px;
border-radius:8px;
color:white;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#2563eb;
}

footer{
text-align:center;
padding:20px;
opacity:.7;
}
</style>

</head>
<body>

<header>
<img src="assets/logo.png" alt="WordToText Logo">
<h1>WordToText</h1>
<p>Convert Word Documents to Clean Text Instantly</p>
</header>

<main class="container">

<div id="dropArea">
<h2>Upload Word File</h2>
<p>Drag & Drop your .DOCX file or click to select</p>
<input type="file" id="fileInput" accept=".docx">
</div>

<textarea id="output" placeholder="Your converted text will appear here..." readonly></textarea>

<div class="buttons">
<button id="copyBtn">Copy</button>
<button id="downloadBtn">Download TXT</button>
</div>

</main>

<footer>
<p>© 2026 WordToText</p>
</footer>

<script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>
<script>
const fileInput = document.getElementById("fileInput");
const output = document.getElementById("output");
const dropArea = document.getElementById("dropArea");

async function convert(file){
  try{
    const buffer = await file.arrayBuffer();
    const result = await mammoth.extractRawText({arrayBuffer:buffer});
    output.value = result.value;
  }catch(err){
    output.value = "Error: "+err.message;
  }
}

fileInput.addEventListener("change", e => { convert(e.target.files[0]); });
dropArea.addEventListener("dragover", e => e.preventDefault());
dropArea.addEventListener("drop", e => {
  e.preventDefault();
  convert(e.dataTransfer.files[0]);
});

document.getElementById("copyBtn").onclick = () => { navigator.clipboard.writeText(output.value); };
document.getElementById("downloadBtn").onclick = () => {
  const blob = new Blob([output.value], {type:"text/plain"});
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "text.txt";
  link.click();
};
</script>

</body>
</html>
